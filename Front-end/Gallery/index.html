<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Scandi Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(180deg, #06161d 0%, #0e242e 100%);
    color: white;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    padding: 60px 20px 20px;
  }
  header h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
  }

  .section {
    padding: 60px 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .section-title {
    font-size: 1.8rem;
    font-weight: 600;
    margin-bottom: 30px;
    text-align: center;
    position: relative;
  }
  .section-title::after {
    content: '';
    width: 80px;
    height: 3px;
    background: #00aaff;
    display: block;
    margin: 10px auto 0;
    border-radius: 3px;
  }

  /* === ADD FORM === */
  .add-form {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }
  .add-form input {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    outline: none;
    width: 280px;
  }
  .add-form button {
    background: #00aaff;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
  }
  .add-form button:hover {
    background: #0090cc;
  }

  /* === GRID GALLERY === */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 30px;
  }
  .card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    cursor: pointer;
    backdrop-filter: blur(10px);
  }
  .card:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
  }
  .card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
  }
  .card-content {
    padding: 20px;
    font-size: 0.9rem;
  }
  .card-link {
    font-size: 0.8rem;
    color: #00aaff;
    text-decoration: none;
  }

  /* === HORIZONTAL SLIDER === */
  .slider-container {
    position: relative;
    width: 100%;
    overflow: hidden;
    margin-top: 40px;
  }
  .slider-track {
    display: flex;
    gap: 20px;
    transition: transform 0.5s ease;
  }
  .slider-card {
    min-width: 300px;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    flex-shrink: 0;
    cursor: pointer;
    transition: transform 0.4s ease;
  }
  .slider-card:hover {
    transform: scale(1.05);
  }
  .slider-card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
  }
  .slider-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    font-size: 1.8rem;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    cursor: pointer;
  }
  .slider-btn.prev { left: 10px; }
  .slider-btn.next { right: 10px; }

  /* === 3D CURVED GALLERY === */
  .curved-gallery {
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1000px;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .curved-card {
    width: 200px;
    height: 300px;
    border-radius: 25px;
    overflow: hidden;
    transform-style: preserve-3d;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    background: rgba(255,255,255,0.05);
    transition: transform 0.4s ease, opacity 0.4s ease;
    cursor: pointer;
    flex-shrink: 0;
  }
  .curved-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .curved-card:hover {
    transform: rotateY(0deg) scale(1.1);
  }

  /* === MODAL === */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 999;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  .modal img {
    max-width: 90%;
    max-height: 80vh;
    border-radius: 15px;
  }
  .close-btn {
    position: absolute;
    top: 20px;
    right: 40px;
    font-size: 32px;
    cursor: pointer;
  }

  @media (max-width: 768px) {
    header h1 { font-size: 2rem; }
    .slider-card { min-width: 240px; }
  }
</style>
</head>

<h1>Scandi Multi-Layout Interactive Gallery</h1>

<!-- === Add New Image Form === -->
