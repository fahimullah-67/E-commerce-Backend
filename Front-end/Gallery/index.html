<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Gallery</title>
</head>
<body>
    <div class="container">
        <div class="text">
            <h1>Image Gallery</h1>
            <p class="prg1">Welcome to the image gallery. Enjoy browsing through the collection! </p>
            <p class="prg2">Click on any image to view it in full size.</p>
        </div>
        <div class="gallery">
            <img src="./public/1.jpg" alt="Image 1" />
            <img src="./public/2.jpg" alt="Image 2" />
            <img src="./public/3.jpg" alt="Image 3" />
            <img src="./public/4.jpg" alt="Image 4" />
            <img src="./public/5.jpg" alt="Image 5" />
        </div>
    </div>
</body>
</html>
