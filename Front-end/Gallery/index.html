<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Gallery</title>
</head>
<body>
    <header>
            <h1>Image Gallery</h1>
            <div class="leftHeader">
                <label for="categories">Filter by Category:</label>
                <select name="categories" id="categories">
                    <option value="all">None</option>
                    <option value="nature">Nature</option>
                    <option value="cities">Cities</option>
                    <option value="people">People</option>
                </select>
                <button>+</button>
            </div>
            <p class="prg1">Welcome to the image gallery. Enjoy browsing through the collection! Click on any image to view
                more.
            </p>
            </header>
            <main>
                <a href="#">
                    <img src="./public/1.jpg" alt="Nature Image">
                    <h3>Nature Image</h3>
                </a>
                <a href="#">
                    <img src="./public/2.jpg" alt="Cityscape">
                    <h3>Cityscape</h3>
                </a>
                <a href="#">
                    <img src="./public/3.jpg" alt="Mountain View">
                    <h3>Mountain View</h3>
                </a>
                <a href="#">
                    <img src="./public/4.jpg" alt="Beach Sunset">
                    <h3>Beach Sunset</h3>
                </a>
            </main>

</body>
</html>
