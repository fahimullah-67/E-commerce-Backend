<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Photo Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /*
        ========================================
        1. ROOT & GLOBAL STYLES
        ========================================
        */
        :root {
            --font-family: 'Poppins', sans-serif;
            
            /* Dark Luxury Scandinavian Theme */
            --color-bg: #1a1d2e;
            --color-bg-gradient: linear-gradient(180deg, #2a2d3e 0%, #1a1d2e 100%);
            --color-card: rgba(42, 45, 62, 0.6); /* Glassy card */
            --color-card-border: rgba(255, 255, 255, 0.1);
            --color-text: #e0e0e0;
            --color-text-muted: #a0a0a0;
            --color-primary: #88c0d0; /* Soft blue accent */
            --color-shadow: rgba(0, 0, 0, 0.3);
            
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            
            --shadow-sm: 0 4px 10px var(--color-shadow);
            --shadow-md: 0 8px 20px var(--color-shadow);

            --transition-main: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family);
            background: var(--color-bg);
            background-image: var(--color-bg-gradient);
            color: var(--color-text);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem;
        }

        img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        h1, h2 {
            margin-bottom: 1.5rem;
            font-weight: 600;
        }
        
        h1 {
            text-align: center;
            font-size: 2.5rem;
            color: var(--color-primary);
        }

        h2 {
            font-size: 1.8rem;
            border-bottom: 2px solid var(--color-primary);
            padding-bottom: 0.5rem;
            display: inline-block;
        }
        
        main {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            gap: 3rem;
        }

        /*
        ========================================
        2. ADD IMAGE FORM
        ========================================
        */
        .add-image-section {
            background: var(--color-card);
            border: 1px solid var(--color-card-border);
            border-radius: var(--border-radius-md);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            backdrop-filter: blur(10px);
        }

        #add-image-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input[type="text"],
        .form-group input[type="url"],
        .form-group input[type="file"] {
            width: 100%;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--color-card-border);
            border-radius: var(--border-radius-sm);
            color: var(--color-text);
            font-family: var(--font-family);
            transition: var(--transition-main);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(136, 192, 208, 0.3);
        }
        
        /* Style file input button */
        .form-group input[type="file"]::file-selector-button {
            background: var(--color-primary);
            color: var(--color-bg);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius-sm);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-main);
            margin-right: 1rem;
        }

        .form-group input[type="file"]::file-selector-button:hover {
            opacity: 0.8;
        }

        .form-buttons {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--border-radius-sm);
            font-family: var(--font-family);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-main);
        }

        .btn-primary {
            background: var(--color-primary);
            color: var(--color-bg);
        }
        .btn-primary:hover {
            opacity: 0.8;
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .btn-danger {
            background: #bf616a; /* Nord "frost" red */
            color: var(--color-text);
        }
        .btn-danger:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }
        
        .file-upload-wrapper {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .file-upload-wrapper span {
            font-style: italic;
            color: var(--color-text-muted);
        }

        /*
        ========================================
        3. GRID GALLERY
        ========================================
        */
        .grid-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .grid-card {
            background: var(--color-card);
            border-radius: var(--border-radius-md);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: var(--transition-main);
            border: 1px solid var(--color-card-border);
            backdrop-filter: blur(10px);
        }

        .grid-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: var(--shadow-md);
        }

        .grid-card .img-wrapper {
            overflow: hidden;
            aspect-ratio: 4 / 3;
        }
        
        .grid-card img {
            transition: transform 0.4s ease-out;
            cursor: zoom-in;
        }
        
        .grid-card:hover img {
            transform: scale(1.1);
        }

        .grid-card-content {
            padding: 1rem 1.25rem;
        }
        
        .grid-card-content h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            word-break: break-all;
        }
        
        .grid-card-content a {
            font-size: 0.8rem;
            color: var(--color-primary);
            text-decoration: none;
            word-break: break-all;
        }
        .grid-card-content a:hover {
            text-decoration: underline;
        }

        /*
        ========================================
        4. SLIDER GALLERY
        ========================================
        */
        .slider-gallery {
            position: relative;
        }

        .slider-wrapper {
            position: relative;
        }
        
        .slider-container {
            display: flex;
            gap: 1.5rem;
            overflow-x: auto;
            padding: 1rem 0;
            
            /* Bonus: Snap scrolling */
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            
            /* Hide scrollbar */
            scrollbar-width: none; /* Firefox */
        }
        .slider-container::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }

        .slider-card {
            flex: 0 0 320px; /* Fixed width for cards */
            background: var(--color-card);
            border-radius: var(--border-radius-md);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: var(--transition-main);
            border: 1px solid var(--color-card-border);
            backdrop-filter: blur(10px);
            scroll-snap-align: center; /* Bonus: Snap scrolling */
        }
        
        .slider-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-5px);
        }

        .slider-card img {
            aspect-ratio: 16 / 10;
            cursor: zoom-in;
        }
        
        .slider-card-content {
            padding: 1rem 1.25rem;
        }
        
        .slider-card-content h3 {
            font-size: 1.1rem;
            word-break: break-all;
        }

        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--color-card);
            border: 1px solid var(--color-card-border);
            color: var(--color-text);
            font-size: 1.5rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-main);
            backdrop-filter: blur(5px);
        }
        .slider-btn:hover {
            background: var(--color-primary);
            color: var(--color-bg);
        }

        #slider-prev { left: -25px; }
        #slider-next { right: -25px; }

        /*
        ========================================
        5. CURVED GALLERY
        ========================================
        */
        .curved-gallery {
            position: relative;
            width: 100%;
            min-height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Hide cards that fly off-screen */
        }

        .curved-wrapper {
            perspective: 2000px; /* Stronger perspective for 3D */
        }

        .curved-container {
            position: relative;
            width: 280px; /* Width of the central card */
            height: 400px; /* Height of the central card */
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .curved-card {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: var(--border-radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 2px solid var(--color-card-border);
            background: var(--color-card);
            transition: var(--transition-main);
            transform-origin: center center;
        }
        
        .curved-card img {
            height: 100%;
            cursor: zoom-in;
            opacity: 0.8; /* Dim non-active cards */
            transition: var(--transition-main);
        }

        /* Bonus: Active card highlight */
        .curved-card.active {
            transform: scale(1.1) !important; /* Force scale */
            z-index: 100;
            border-color: var(--color-primary);
            box-shadow: 0 10px 30px var(--color-shadow);
        }
        
        .curved-card.active img {
            opacity: 1;
        }
        
        /* Bonus: Hover elevation */
        .curved-card:not(.active):hover {
            transform: scale(1.05) !important; /* Needs !important to override JS transform */
            z-index: 99;
            box-shadow: var(--shadow-md);
        }
        .curved-card:not(.active):hover img {
            opacity: 1;
        }

        .curved-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--color-card);
            border: 1px solid var(--color-card-border);
            color: var(--color-text);
            font-size: 1.5rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1000; /* Above everything */
            transition: var(--transition-main);
            backdrop-filter: blur(5px);
        }
        .curved-btn:hover {
            background: var(--color-primary);
            color: var(--color-bg);
        }
        
        #curved-prev { left: 10%; }
        #curved-next { right: 10%; }


        /*
        ========================================
        6. MODAL PREVIEW
        ========================================
        */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(26, 29, 46, 0.8); /* Dark bg */
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            
            /* Initial state for fade-in */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        
        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            box-shadow: var(--shadow-md);
            border-radius: var(--border-radius-sm);
            /* Animation for modal content */
            transform: scale(0.95);
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        
        .modal.active .modal-content {
            transform: scale(1);
            opacity: 1;
        }

        .modal-content img {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 90vh; /* Ensure it fits */
            object-fit: contain;
            border-radius: var(--border-radius-sm);
        }

        /*
        ========================================
        7. ANIMATIONS & UTILITIES
        ========================================
        */
        @keyframes fadeInScaleUp {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .animate-add {
            animation: fadeInScaleUp 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        /*
        ========================================
        8. RESPONSIVENESS
        ========================================
        */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            h1 { font-size: 2rem; }
            h2 { font-size: 1.5rem; }

            #add-image-form {
                grid-template-columns: 1fr; /* Stack form inputs */
            }
            
            .file-upload-wrapper {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .form-buttons {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
            
            .grid-gallery {
                grid-template-columns: 1fr; /* Single column grid */
            }

            .slider-card {
                flex-basis: 280px; /* Smaller slider cards */
            }
            
            .slider-btn {
                /* Hide buttons on mobile, rely on touch scroll */
                display: none;
            }

            .curved-gallery {
                min-height: 350px;
            }
            .curved-container {
                width: 200px;
                height: 300px;
            }
            .curved-btn {
                top: auto;
                bottom: 0;
                transform: none;
                z-index: 1000;
            }
            #curved-prev { left: 20%; }
            #curved-next { right: 20%; }
        }

    </style>
</head>
<body>

    <header>
        <h1>Modern Photo Gallery</h1>
        </header>

    <main>
        <section class="add-image-section" aria-labelledby="form-heading">
            <h2 id="form-heading">Add New Image</h2>
            <form id="add-image-form">
                <div class="form-group">
                    <label for="img-url">Image URL</label>
                    <input type="url" id="img-url" placeholder="https://example.com/image.jpg" required>
                </div>
    
                <div class="form-group">
                    <label for="img-title">Title (Optional)</label>
                    <input type="text" id="img-title" placeholder="e.g., 'Sunset in Norway'">
                </div>
    
                <div class="file-upload-wrapper">
                    <span>or</span>
                    <div class="form-group">
                        <label for="img-file">Upload Local Image</label>
                        <input type="file" id="img-file" accept="image/*">
                    </div>
                </div>
    
                <div class="form-buttons">
                    <button type="button" id="clear-all-btn" class="btn btn-danger" aria-label="Clear all images">Clear
                        All</button>
                    <button type="submit" class="btn btn-primary">Add Image</button>
                </div>
            </form>
        </section>

        <section class="gallery-wrapper" aria-labelledby="grid-heading">
            <h2 id="grid-heading">Grid Gallery</h2>
            <div classs="grid-gallery-container">
                <div class="grid-gallery" id="grid-gallery">
                </div>
            </div>
        </section>

        <section class="gallery-wrapper" aria-labelledby="slider-heading">
            <h2 id="slider-heading">Horizontal Slider</h2>
            <div class="slider-gallery">
                <button id="slider-prev" class="slider-btn" aria-label="Previous image">&lt;</button>
                <div class="slider-wrapper">
                    <div class="slider-container" id="slider-container">
                    </div>
                </div>
                <button id="slider-next" class="slider-btn" aria-label="Next image">&gt;</button>
            </div>
        </section>

        <section class="gallery-wrapper" aria-labelledby="curved-heading">
            <h2 id="curved-heading">3D Curved Carousel</h2>
            <div class="curved-gallery">
                <button id="curved-prev" class="curved-btn" aria-label="Previous image">&lt;</button>
                <div class="curved-wrapper">
                    <div class="curved-container" id="curved-container">
                    </div>
                </div>
                <button id="curved-next" class="curved-btn" aria-label="Next image">&gt;</button>
            </div>
        </section>
    </main>

    <div class="modal" id="image-modal" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="modal-content">
            <img src="" id="modal-image" alt="Full-size preview">
        </div>
    </div>

    <script>
                    document.addEventListener('DOMContentLoaded', () => {

                        // ========================================
                        // 1. STATE & CONSTANTS
                        // ========================================
                        let images = [];
                        let currentCurvedIndex = 0;
                        const STORAGE_KEY = 'photoGalleryImages_v1';

                        // ========================================
                        // 2. DOM SELECTORS
                        // ========================================
                        // Form
                        const addForm = document.getElementById('add-image-form');
                        const urlInput = document.getElementById('img-url');
                        const titleInput = document.getElementById('img-title');
                        const fileInput = document.getElementById('img-file');
                        const clearAllBtn = document.getElementById('clear-all-btn');

                        // Galleries
                        const gridGallery = document.getElementById('grid-gallery');
                        const sliderContainer = document.getElementById('slider-container');
                        const curvedContainer = document.getElementById('curved-container');

                        // Slider Controls
                        const sliderPrevBtn = document.getElementById('slider-prev');
                        const sliderNextBtn = document.getElementById('slider-next');

                        // Curved Controls
                        const curvedPrevBtn = document.getElementById('curved-prev');
                        const curvedNextBtn = document.getElementById('curved-next');

                        // Modal
                        const modal = document.getElementById('image-modal');
                        const modalImage = document.getElementById('modal-image');

                        // ========================================
                        // 3. CORE FUNCTIONS (Data & Storage)
                        // ========================================

                        /**
                         * Saves the current image array to localStorage.
                         */
                        function saveToStorage() {
                            try {
                                localStorage.setItem(STORAGE_KEY, JSON.stringify(images));
                            } catch (e) {
                                console.error("Failed to save to localStorage", e);
                            }
                        }

                        /**
                         * Loads images from localStorage on page load.
                         */
                        function loadFromStorage() {
                            try {
                                const storedImages = localStorage.getItem(STORAGE_KEY);
                                if (storedImages) {
                                    images = JSON.parse(storedImages);
                                } else {
                                    // Add default images if storage is empty
                                    images = [
                                        { id: 1, url: 'https://images.unsplash.com/photo-1507525428034-b723a9ce6434?ixlib=rb-4.0.3&q=80&fm=jpg&w=800&fit=max', title: 'Tropical Beach' },
                                        { id: 2, url: 'https://images.unsplash.com/photo-1470252649378-9c29740c9f40?ixlib=rb-4.0.3&q=80&fm=jpg&w=800&fit=max', title: 'Misty Morning' },
                                        { id: 3, url: 'https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?ixlib=rb-4.0.3&q=80&fm=jpg&w=800&fit=max', title: 'Enchanted Forest' },
                                        { id: 4, url: 'https://images.unsplash.com/photo-1501854140801-50d01698950b?ixlib=rb-4.0.3&q=80&fm=jpg&w=800&fit=max', title: 'Mountain Valley' },
                                        { id: 5, url: 'https://images.unsplash.com/photo-1472214103451-9374b1c24534?ixlib=rb-4.0.3&q=80&fm=jpg&w=800&fit=max', title: 'Rolling Hills' },
                                    ];
                                    saveToStorage();
                                }

                                if (images.length > 0) {
                                    renderAllGalleries();
                                }
                            } catch (e) {
                                console.error("Failed to load from localStorage", e);
                                images = [];
                            }
                        }

                        /**
                         * Adds a new image to the state, storage, and all galleries.
                         * @param {string} url - The image URL (or data URL)
                         * @param {string} title - The image title
                         */
                        function addImage(url, title) {
                            if (!url) return;

                            const newImage = {
                                id: Date.now(),
                                url: url,
                                title: title || 'Untitled'
                            };

                            images.push(newImage);
                            saveToStorage();

                            // Add to each gallery with animation
                            appendImageToGrid(newImage, true);
                            appendImageToSlider(newImage, true);
                            appendImageToCurved(newImage, true);

                            // Update curved gallery layout
                            updateCurvedGalleryLayout();
                        }

                        /**
                         * Clears all images from state, storage, and DOM.
                         */
                        function clearAllImages() {
                            if (!confirm('Are you sure you want to clear all images? This cannot be undone.')) {
                                return;
                            }

                            images = [];
                            currentCurvedIndex = 0;
                            saveToStorage();

                            gridGallery.innerHTML = '';
                            sliderContainer.innerHTML = '';
                            curvedContainer.innerHTML = '';

                            // Reset curved container rotation
                            curvedContainer.style.transform = 'rotateY(0deg)';
                        }


                        // ========================================
                        // 4. RENDER & CARD CREATION FUNCTIONS
                        // ========================================

                        /**
                         * Renders all images in all galleries (used on initial load).
                         */
                        function renderAllGalleries() {
                            gridGallery.innerHTML = '';
                            sliderContainer.innerHTML = '';
                            curvedContainer.innerHTML = '';

                            images.forEach(image => {
                                appendImageToGrid(image, false);
                                appendImageToSlider(image, false);
                                appendImageToCurved(image, false);
                            });

                            updateCurvedGalleryLayout();
                        }

                        /**
                         * Creates and appends a card to the Grid Gallery.
                         * @param {object} image - The image object
                         * @param {boolean} animate - Whether to apply the add animation
                         */
                        function appendImageToGrid(image, animate = false) {
                            const card = document.createElement('div');
                            card.className = 'grid-card';
                            card.dataset.src = image.url; // For modal

                            const sourceLink = image.url.startsWith('http')
                                ? `<a href="${image.url}" target="_blank" rel="noopener noreferrer">${image.url.substring(0, 30)}...</a>`
                                : `<a href="#" onclick="return false;">Local File</a>`;

                            card.innerHTML = `
                    <div class="img-wrapper">
                        <img src="${image.url}" alt="${image.title}" loading="lazy">
                    </div>
                    <div class="grid-card-content">
                        <h3>${image.title}</h3>
                        ${sourceLink}
                    </div>
                `;

                            if (animate) card.classList.add('animate-add');
                            gridGallery.appendChild(card);
                        }

                        /**
                         * Creates and appends a card to the Slider Gallery.
                         * @param {object} image - The image object
                         * @param {boolean} animate - Whether to apply the add animation
                         */
                        function appendImageToSlider(image, animate = false) {
                            const card = document.createElement('div');
                            card.className = 'slider-card';
                            card.dataset.src = image.url; // For modal

                            card.innerHTML = `
                    <img src="${image.url}" alt="${image.title}" loading="lazy">
                    <div class="slider-card-content">
                        <h3>${image.title}</h3>
                    </div>
                `;

                            if (animate) card.classList.add('animate-add');
                            sliderContainer.appendChild(card);
                        }

                        /**
                         * Creates and appends a card to the Curved Gallery.
                         * @param {object} image - The image object
                         * @param {boolean} animate - Whether to apply the add animation
                         */
                        function appendImageToCurved(image, animate = false) {
                            const card = document.createElement('div');
                            card.className = 'curved-card';
                            card.dataset.src = image.url; // For modal

                            card.innerHTML = `<img src="${image.url}" alt="${image.title}" loading="lazy">`;

                            if (animate) card.classList.add('animate-add');
                            curvedContainer.appendChild(card);
                        }

                        // ========================================
                        // 5. GALLERY-SPECIFIC LOGIC
                        // ========================================

                        // --- Slider Gallery ---
                        function slide(direction) {
                            const cardWidth = sliderContainer.querySelector('.slider-card')?.offsetWidth || 300;
                            const scrollAmount = (cardWidth + 24) * direction; // 24px is the 1.5rem gap
                            sliderContainer.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                        }

                        // --- Curved Gallery ---
                        function updateCurvedGalleryLayout() {
                            const cards = curvedContainer.querySelectorAll('.curved-card');
                            const numCards = cards.length;
                            if (numCards === 0) return;

                            const angle = 360 / numCards;
                            // Adjust radius dynamically based on card count to prevent overlap
                            const radius = Math.max(numCards * 40, 300); // 40px per card, min 300px

                            cards.forEach((card, i) => {
                                const rotateY = i * angle;
                                card.style.transform = `rotateY(${rotateY}deg) translateZ(${radius}px)`;
                            });

                            rotateCurvedCarousel(); // Apply initial rotation and active class
                        }

                        function rotateCurvedCarousel() {
                            if (images.length === 0) return;

                            const angle = 360 / images.length;
                            const targetRotation = -currentCurvedIndex * angle;
                            curvedContainer.style.transform = `rotateY(${targetRotation}deg)`;

                            // Update active card
                            const cards = curvedContainer.querySelectorAll('.curved-card');
                            cards.forEach((card, i) => {
                                // The "active" card is the one whose index matches currentCurvedIndex
                                if (i === currentCurvedIndex) {
                                    card.classList.add('active');
                                } else {
                                    card.classList.remove('active');
                                }
                            });
                        }

                        function navigateCurved(direction) {
                            if (images.length === 0) return;

                            currentCurvedIndex += direction;

                            // Loop around
                            if (currentCurvedIndex < 0) {
                                currentCurvedIndex = images.length - 1;
                            } else if (currentCurvedIndex >= images.length) {
                                currentCurvedIndex = 0;
                            }

                            rotateCurvedCarousel();
                        }

                        // ========================================
                        // 6. MODAL LOGIC
                        // ========================================

                        function openModal(src) {
                            modalImage.src = src;
                            modal.classList.add('active');
                            modal.setAttribute('aria-hidden', 'false');
                        }

                        function closeModal() {
                            modal.classList.remove('active');
                            modal.setAttribute('aria-hidden', 'true');
                            modalImage.src = ""; // Clear src
                        }

                        // ========================================
                        // 7. EVENT LISTENERS
                        // ========================================

                        // --- Form Listeners ---
                        addForm.addEventListener('submit', (e) => {
                            e.preventDefault();
                            const url = urlInput.value.trim();
                            const title = titleInput.value.trim();
                
                        if (url) {
                            addImage(url, title);
                            // Clear inputs
                            urlInput.value = '';
                            titleInput.value = '';
                            fileInput.value = ''; // Clear file input too
                        } else {
                            alert('Please enter an Image URL or upload a file.');
                        }
                    });

                    fileInput.addEventListener('change', (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = (event) => {
                                const dataUrl = event.target.result;
                                const title = titleInput.value.trim() || file.name;
                                addImage(dataUrl, title);

                                // Clear inputs
                                urlInput.value = '';
                                titleInput.value = '';
                                fileInput.value = '';
                            };
                            reader.onerror = (err) => {
                                console.error("FileReader error:", err);
                                alert("Error reading file.");
                            };
                            reader.readAsDataURL(file);
                        }
                });

                    clearAllBtn.addEventListener('click', clearAllImages);

                    // --- Gallery Controls ---
                    sliderPrevBtn.addEventListener('click', () => slide(-1));
                    sliderNextBtn.addEventListener('click', () => slide(1));

                    curvedPrevBtn.addEventListener('click', () => navigateCurved(-1));
                    curvedNextBtn.addEventListener('click', () => navigateCurved(1));

                    // --- Modal Listeners (Event Delegation) ---
                    function handleGalleryClick(e) {
                        // Find the closest card parent
                        const card = e.target.closest('.grid-card, .slider-card, .curved-card');
                        if (card && card.dataset.src) {
                            // Only open modal if the image itself (or wrapper) was clicked, not a link
                            if (!e.target.matches('a, a *')) {
                                openModal(card.dataset.src);
                            }
                        }
                    }

                    gridGallery.addEventListener('click', handleGalleryClick);
                    sliderContainer.addEventListener('click', handleGalleryClick);
                    curvedContainer.addEventListener('click', handleGalleryClick);
                
                    // Close modal events
                    modal.addEventListener('click', (e) => {
                        // Check if the click is on the modal backdrop itself
                        if (e.target === modal) {
                            closeModal();
                        }
                });

                    window.addEventListener('keydown', (e) => {
                        if (e.key === 'Escape' && modal.classList.contains('active')) {
                            closeModal();
                        }
                });

                    // ========================================
                    // 8. INITIALIZATION
                    // ========================================
                    loadFromStorage();

                });
            </script>
</body>
</html>
